<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatrice & Federico | 29.08.2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@300;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --sage-main: #8ba88e;   
            --sage-light: #f1f4f1;  
            --sage-dark: #5a6d5c;   
            --white-pure: #ffffff;
            --text-dark: #333d34;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Afacad Flux', sans-serif; 
            line-height: 1.8; 
            color: var(--text-dark); 
            background-color: var(--white-pure);
            scroll-behavior: smooth;
        }

        h1, h2, h3 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
            color: var(--sage-dark);
        }

        /* HEADER - DESIGN "ABBRACCIO" */
        .site-header {
            padding: 100px 24px 80px;
            text-align: center;
            background-color: var(--sage-light);
            border-bottom: 1px solid #e8ede8;
            position: relative;
            overflow: hidden;
        }

        .wedding-bouquet {
            max-width: 280px; /* Logo più importante */
            height: auto;
            margin-bottom: -20px; /* Lo avvicina ai nomi */
            display: block;
            margin-left: auto;
            margin-right: auto;
            
            /* Filtro per ricolorare il tuo bouquet.jpg in Salvia */
            filter: sepia(1) saturate(1.2) hue-rotate(85deg) brightness(0.8);
            mix-blend-mode: multiply; 
        }

        .site-header h1 { 
            font-size: 3.5rem; 
            font-style: italic; 
            margin-bottom: 10px;
            position: relative;
        }

        .site-header p { 
            font-size: 0.9rem; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            color: var(--sage-main);
        }

        .container { padding: 60px 24px; max-width: 800px; margin: auto; }

        /* IBAN RESPONSIVE - SOLUZIONE AL PROBLEMA */
        .gift-area { 
            background-color: var(--sage-light); 
            padding: 60px 20px; 
            border-radius: 20px; 
            text-align: center; 
            margin: 60px 0;
            border: 1px solid #e8ede8;
        }

        .iban-code { 
            font-size: 1.1rem; 
            margin-top: 20px; 
            padding: 15px; 
            display: block; /* Occupa tutta la riga se necessario */
            color: var(--sage-dark);
            background: white; 
            border-radius: 10px; 
            border: 1px solid #e2e8e2;
            font-family: monospace;
            
            /* Queste due righe impediscono lo sforamento sui cellulari */
            word-break: break-all; 
            max-width: 100%;
        }

        /* RESTO DEGLI STILI */
        .event-row { 
            display: flex; align-items: baseline; gap: 40px; 
            padding: 30px 0; border-top: 1px solid #eee;
        }
        .time { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--sage-main); min-width: 70px; }
        
        .btn-submit {
            background: var(--sage-main); color: white; padding: 18px 40px;
            text-decoration: none; border-radius: 50px; font-size: 0.9rem;
            letter-spacing: 2px; border: none; cursor: pointer; text-transform: uppercase;
        }

        .form-card { background: white; padding: 40px; border-radius: 20px; border: 1px solid #f0f0f0; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
        .form-group { margin-bottom: 25px; text-align: left; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e8ede8; border-radius: 8px; font-family: inherit; }

        @media (max-width: 600px) {
            .site-header { padding: 60px 20px; }
            .wedding-bouquet { max-width: 200px; }
            .site-header h1 { font-size: 2.4rem; }
            .event-row { flex-direction: column; gap: 10px; }
            .iban-code { font-size: 0.9rem; letter-spacing: 0; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="bouquet.jpg" alt="Logo" class="wedding-bouquet">
        <h1>Beatrice & Federico</h1>
        <p>29 Agosto 2026</p>
    </header>

    <section class="container">
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="font-size: 2rem;">Il Programma</h2>
        </div>
        
        <div class="schedule-list">
            <div class="event-row">
                <div class="time">17:00</div>
                <div class="event-info">
                    <h3>La Cerimonia</h3>
                    <p>Rocca dei Bentivoglio, Bazzano</p>
                </div>
            </div>
            <div class="event-row">
                <div class="time">18:30</div>
                <div class="event-info">
                    <h3>Ricevimento</h3>
                    <p>Castellazzo di Monteveglio</p>
                </div>
            </div>
        </div>

        <div class="gift-area">
            <h3>Il nostro futuro</h3>
            <p>Se desiderate contribuire al nostro viaggio:</p>
            <div class="iban-code">IT57Y0707236670000000767183</div>
        </div>

        <div id="rsvp" class="form-card">
            <h2 style="text-align: center; margin-bottom: 30px;">Ci sarete?</h2>
            <form action="https://formspree.io/f/mwvwrrdd" method="POST">
                <div class="form-group">
                    <label>Nomi</label>
                    <input type="text" name="Nomi" required>
                </div>
                <div class="form-group">
                    <label>Bambini</label>
                    <select name="Bambini">
                        <option value="0">Nessuno</option>
                        <option value="1">1 bambino</option>
                        <option value="2+">2 o più</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Intolleranze</label>
                    <textarea name="Note" rows="2"></textarea>
                </div>
                <div style="text-align: center;">
                    <button type="submit" class="btn-submit">Invia</button>
                </div>
            </form>
        </div>
    </section>

    <footer style="text-align: center; padding: 40px; color: var(--sage-main); font-size: 0.8rem;">
        B & F — 2026
    </footer>

</body>
</html>
