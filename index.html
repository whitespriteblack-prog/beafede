<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatrice & Federico | 29.08.2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@300;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest-deep: #283618; 
            --gold-muted: #bda671;  
            --bg-pearl: #fdfdfb;    
            --text-main: #3d3d3d;
            --accent-soft: #f4f1ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Afacad Flux', sans-serif; 
            line-height: 1.8; 
            color: var(--text-main); 
            background-color: var(--bg-pearl);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
            letter-spacing: 0.01em; 
            color: var(--forest-deep);
        }

        .container { padding: 120px 24px; max-width: 800px; margin: auto; }

        .hero {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), 
                        url('https://images.unsplash.com/photo-1546190255-451a91afc548?q=80&w=2070') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero-content h1 { font-size: 3.8rem; margin-bottom: 10px; color: white; font-style: italic; }
        .hero-content p { font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 300; }

        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.5rem; position: relative; display: inline-block; padding-bottom: 15px; }
        .section-header h2::after { 
            content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 1px; background: var(--gold-muted); 
        }

        .schedule-grid { display: grid; grid-template-columns: 1fr; gap: 40px; margin-top: 40px; }
        .event-item { 
            display: flex; align-items: flex-start; gap: 30px; 
            padding: 30px; border-bottom: 1px solid var(--accent-soft);
        }
        .time { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold-muted); min-width: 80px; }
        .event-details h3 { font-size: 1.4rem; margin-bottom: 5px; }
        .event-details p { font-size: 1rem; opacity: 0.75; font-weight: 300; }
        
        .location-link { 
            display: inline-block; margin-top: 10px; font-size: 0.8rem; 
            color: var(--forest-deep); text-decoration: none; border-bottom: 1px solid var(--gold-muted);
            transition: 0.3s;
        }
        .location-link:hover { color: var(--gold-muted); }

        .gift-section { 
            background-color: var(--accent-soft); 
            padding: 60px; border-radius: 4px; text-align: center; margin: 60px 0;
            border: 1px solid #e9e5db;
        }
        .gift-section h3 { margin-bottom: 20px; font-size: 1.8rem; }
