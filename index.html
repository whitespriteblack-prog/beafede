<!DOCTYPE html>
<html lang="it">
<head>
    <title>Matrimonio di Bea & Fede</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #8fa194; /* Grigio tendente al verde */
            --text-color: #333d36;
            --line-color: rgba(51, 61, 54, 0.3);
            --main-color: #333d36;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'EB Garamond', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Navigazione */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 0;
            text-align: center; background-color: var(--bg-color); z-index: 1000;
        }

        nav a {
            text-decoration: none; color: var(--text-color); margin: 0 15px;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }

        /* Struttura Sezioni */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        /* TITOLI FISSI (Allineamento identico su ogni pagina) */
        h2 {
            font-family: 'EB Garamond', serif !important;
            font-size: 2.2rem !important;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-color);
            margin-top: 100px !important; /* Distanza fissa dall'alto */
            margin-bottom: 0 !important;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CONTENITORE FLESSIBILE (Riempie la pagina e centra il contenuto) */
        .section-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra verticalmente gli elementi */
            gap: 40px; /* Spazio tra i blocchi di testo */
            width: 100%;
            max-width: 600px;
            padding-bottom: 60px; /* Evita che il testo tocchi il fondo */
        }

        h1 { font-size: 3.5rem; font-weight: 400; margin-bottom: 10px; }

        hr { width: 60%; border: 0; border-top: 1px solid var(--line-color); margin: 0 auto; }

        .info-text { font-size: 1.2rem; line-height: 1.4; }

        .iban { font-size: 1.2rem; letter-spacing: 1px; padding: 15px; border: 1px solid var(--line-color); display: inline-block; }

        form { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; margin: 0 auto; }
